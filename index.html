<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Re:Block - One File Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-top: #FFFDF2; --bg-bottom: #FFF3B0; --panel-bg: rgba(255,255,255,.86); --panel-border: rgba(255,255,255,.96);
      --text-main: #5D4037; --text-accent: #2E7D32; --shadow-soft: 0 8px 28px rgba(93,64,55,.10);
      --btn-color: #4caf50; --btn-hover: #43a047; --color-bottle: #0288d1; --color-can: #e65100; --color-paper: #33691e;
      --rank-purple: #8E24AA; --danger: #d32f2f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; color: var(--text-main); }
    body {
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      background-image: radial-gradient(rgba(255,255,255,.8) 2px, transparent 2px), radial-gradient(rgba(255,255,255,.55) 2px, transparent 2px);
      background-size: 40px 40px, 60px 60px; background-position: 0 0, 20px 20px;
    }
    .glass { background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 18px; box-shadow: var(--shadow-soft); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; z-index: 10; }
    .game-title { font-family: 'Quicksand', sans-serif; font-size: clamp(2.7rem, 10vw, 4.6rem); line-height: 1; font-weight: 900; color: var(--text-accent); text-shadow: 2px 2px 0 #fff, 0 4px 10px rgba(0,0,0,.1); white-space: nowrap; }
    .eco-btn { margin-top: 14px; background: var(--btn-color); color: #fff; border: none; border-radius: 999px; padding: 14px 34px; cursor: pointer; font-weight: 900; font-size: clamp(1.05rem, 4vw, 1.35rem); box-shadow: 0 6px 18px rgba(76,175,80,.35); transition: all .18s ease; }
    .eco-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
    #game-screen { display: none; height: 100vh; width: 100vw; padding: 10px; gap: 16px; align-items: center; justify-content: center; flex-direction: column; }
    #game-canvas { background: rgba(255,255,255,.82); border: 3px solid var(--text-main); border-radius: 12px; max-width: 100%; max-height: 65vh; }
    .bins-container { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 320px; }
    .bin { flex: 1; padding: 10px; border-radius: 10px; text-align: center; color: white; font-weight: 900; cursor: pointer; font-size: 0.9rem; }
    #bin-bottle { background: var(--color-bottle); }
    #bin-can { background: var(--color-can); }
    #bin-paper { background: var(--color-paper); }
    .score-board { font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; color: var(--text-main); }
  </style>
</head>
<body>

  <!-- タイトル画面 -->
  <div id="title-screen" class="screen">
    <h1 class="game-title">Re:Block</h1>
    <p style="margin-top: 10px; color: #558b2f; font-weight: 700; font-size: clamp(.92rem,3.5vw,1.18rem);">落ち物リサイクルパズルゲーム</p>
    <button class="eco-btn" onclick="startGame()">START GAME</button>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="screen">
    <div class="score-board">SCORE: <span id="score-val">0</span></div>
    <canvas id="game-canvas" width="300" height="500"></canvas>
    <div class="bins-container">
      <div id="bin-bottle" class="bin" onclick="sortItem('bottle')">ペットボトル</div>
      <div id="bin-can" class="bin" onclick="sortItem('can')">かん</div>
      <div id="bin-paper" class="bin" onclick="sortItem('paper')">かみくず</div>
    </div>
    <p style="margin-top: 10px; font-size: 0.8rem; font-weight: 700;">下のボタンをタップして、落ちてくるゴミを正しく分別しよう！</p>
  </div>

  <script>
    // Supabaseの初期化設定
    const SUPABASE_URL = "https://mkwqprygjurqcejqvier.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_lKHBE8teP-pQ1RGK02WCBA_tsXABAX_";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0;
    let gameInterval;
    let currentItem = { x: 125, y: 0, type: 'bottle', text: '🍾' };
    const types = [
      { name: 'bottle', icon: '🍾', color: '#0288d1' },
      { name: 'can', icon: '🥫', color: '#e65100' },
      { name: 'paper', icon: '📄', color: '#33691e' }
    ];

    function startGame() {
      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      score = 0;
      document.getElementById('score-val').innerText = score;
      spawnItem();
      if(gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(update, 30);
    }

    function spawnItem() {
      const randomType = types[Math.floor(Math.random() * types.length)];
      currentItem.x = Math.random() * (canvas.width - 50) + 10;
      currentItem.y = 0;
      currentItem.type = randomType.name;
      currentItem.text = randomType.icon;
    }

    function update() {
      currentItem.y += 3; // 落下速度
      
      // 一番下まで落ちてしまった場合（ペナルティ）
      if (currentItem.y > canvas.height) {
        score = Math.max(0, score - 10);
        document.getElementById('score-val').innerText = score;
        spawnItem();
      }
      
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 落ちてくるゴミの描画
      ctx.font = "40px sans-serif";
      ctx.textBaseline = "top";
      ctx.fillText(currentItem.text, currentItem.x, currentItem.y);
    }

    // 分別ボタンが押された時の処理
    async function sortItem(binType) {
      if (currentItem.type === binType) {
        score += 100; // 正解
      } else {
        score = Math.max(0, score - 50); // 不正解
      }
      document.getElementById('score-val').innerText = score;
      spawnItem();

      // スコアが特定値に達した際などにSupabaseへ保存する処理も可能
      if (score > 0 && score % 500 === 0) {
        try {
          await supabase.from('reblock-ranking').insert([{ score: score }]);
        } catch(e) { console.log(e); }
      }
    }
  </script>
</body>
</html>
