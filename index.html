<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Re:Block - One File Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #FFFDF2; --bg-bottom: #FFF3B0; --panel-bg: rgba(255,255,255,.86); --panel-border: rgba(255,255,255,.96);
      --text-main: #5D4037; --text-accent: #2E7D32; --shadow-soft: 0 8px 28px rgba(93,64,55,.10);
      --btn-color: #4caf50; --btn-hover: #43a047;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; color: var(--text-main); }
    body {
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      background-image: radial-gradient(rgba(255,255,255,.8) 2px, transparent 2px);
      background-size: 40px 40px;
    }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
    .game-title { font-family: 'Quicksand', sans-serif; font-size: clamp(2.7rem, 10vw, 4.6rem); font-weight: 900; color: var(--text-accent); text-shadow: 2px 2px 0 #fff; }
    .eco-btn { margin-top: 20px; background: var(--btn-color); color: #fff; border: none; border-radius: 999px; padding: 14px 40px; cursor: pointer; font-weight: 900; font-size: 1.2rem; box-shadow: 0 6px 18px rgba(76,175,80,.35); transition: all .2s; }
    .eco-btn:hover { background: var(--btn-hover); transform: translateY(-2px); }
    #game-screen { display: none; background: rgba(255,255,255,0.5); }
    .game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    canvas { background: #fff; border: 4px solid var(--text-main); border-radius: 12px; box-shadow: var(--shadow-soft); max-width: 100%; max-height: 70vh; }
  </style>
</head>
<body>

  <div id="title-screen" class="screen">
    <h1 class="game-title">Re:Block</h1>
    <p style="margin-top: 10px; font-weight: 700; color: #558b2f;">落ち物リサイクルパズルゲーム</p>
    <button class="eco-btn" onclick="startGame()">START GAME</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="game-container">
      <div style="font-size: 1.5rem; font-weight: 900; margin-bottom: 10px;">SCORE: <span id="score-val">0</span></div>
      <canvas id="game-canvas" width="300" height="600"></canvas>
      <p style="margin-top: 10px; font-size: 0.9rem; font-weight: 700;">← 画面の左右をタップして移動 / ２本指タップで回転 →</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const ROW = 20; const COL = 10; const SIZE = 30;
    let board = Array.from({length: ROW}, () => Array(COL).fill(0));
    let score = 0;
    let currentBlock = [[1,1],[1,1]];
    let blockX = 4; let blockY = 0;
    let gameInterval;

    function startGame() {
      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      score = 0;
      board = Array.from({length: ROW}, () => Array(COL).fill(0));
      blockX = 4; blockY = 0;
      if(gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(update, 500);
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // 盤面の描画
      for(let r=0; r<ROW; r++) {
        for(let c=0; c<COL; c++) {
          if(board[r][c]) {
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(c*SIZE, r*SIZE, SIZE-2, SIZE-2);
          }
        }
      }
      // 動いているブロックの描画
      ctx.fillStyle = '#e65100';
      for(let r=0; r<currentBlock.length; r++) {
        for(let c=0; c<currentBlock[r].length; c++) {
          if(currentBlock[r][c]) {
            ctx.fillRect((blockX+c)*SIZE, (blockY+r)*SIZE, SIZE-2, SIZE-2);
          }
        }
      }
      document.getElementById('score-val').innerText = score;
    }

    function update() {
      blockY++;
      if(hitCheck()) {
        blockY--;
        mergeBlock();
        clearLines();
        blockX = 4; blockY = 0;
        if(hitCheck()) {
          alert("GAME OVER! スコア: " + score);
          document.getElementById('title-screen').style.display = 'flex';
          document.getElementById('game-screen').style.display = 'none';
          clearInterval(gameInterval);
        }
      }
      draw();
    }

    function hitCheck() {
      for(let r=0; r<currentBlock.length; r++) {
        for(let c=0; c<currentBlock[r].length; c++) {
          if(currentBlock[r][c]) {
            let nextX = blockX + c;
            let nextY = blockY + r;
            if(nextX < 0 || nextX >= COL || nextY >= ROW) return true;
            if(nextY >= 0 && board[nextY][nextX]) return true;
          }
        }
      }
      return false;
    }

    function mergeBlock() {
      for(let r=0; r<currentBlock.length; r++) {
        for(let c=0; c<currentBlock[r].length; c++) {
          if(currentBlock[r][c]) board[blockY+r][blockX+c] = 1;
        }
      }
    }

    function clearLines() {
      for(let r=ROW-1; r>=0; r--) {
        if(board[r].every(v => v === 1)) {
          board.splice(r, 1);
          board.unshift(Array(COL).fill(0));
          score += 100;
          r++;
        }
      }
    }

    // 操作（画面タップ）
    window.addEventListener('touchstart', (e) => {
      if(document.getElementById('game-screen').style.display === 'flex') {
        if (e.touches.length >= 2) {
          // 回転（２本指）
          currentBlock = currentBlock[0].map((_, i) => currentBlock.map(row => row[i]).reverse());
          if(hitCheck()) currentBlock = currentBlock[0].map((_, i) => currentBlock.map(row => row[i])).reverse(); // 戻す
        } else {
          // 移動（左右タップ）
          let touchX = e.touches[0].clientX;
          if(touchX < window.innerWidth / 2) {
            blockX--; if(hitCheck()) blockX++;
          } else {
            blockX++; if(hitCheck()) blockX--;
          }
        }
        draw();
      }
    });
  </script>
</body>
</html>
