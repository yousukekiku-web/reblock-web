<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Re:Block - One File Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-top: #FFFDF2; --bg-bottom: #FFF3B0; --panel-bg: rgba(255,255,255,.86); --panel-border: rgba(255,255,255,.96);
      --text-main: #5D4037; --text-accent: #2E7D32; --shadow-soft: 0 8px 28px rgba(93,64,55,.10);
      --btn-color: #4caf50; --btn-hover: #43a047; --color-bottle: #0288d1; --color-can: #e65100; --color-paper: #33691e;
      --rank-purple: #8E24AA; --danger: #d32f2f;
    }
    * { margin: 0; padding: 0; box-shadow: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif; color: var(--text-main); overflow: hidden;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      background-image: radial-gradient(rgba(255,255,255,.8) 2px, transparent 2px), radial-gradient(rgba(255,255,255,.55) 2px, transparent 2px);
      background-size: 40px 40px, 60px 60px; background-position: 0 0, 20px 20px;
    }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
    .game-title { font-family: 'Quicksand', sans-serif; font-size: clamp(2.7rem, 10vw, 4.6rem); font-weight: 900; color: var(--text-accent); text-shadow: 2px 2px 0 #fff; }
    .eco-btn { margin-top: 14px; background: var(--btn-color); color: #fff; border: none; border-radius: 999px; padding: 14px 34px; cursor: pointer; font-weight: 900; font-size: clamp(1.05rem, 4vw, 1.35rem); box-shadow: 0 6px 18px rgba(76,175,80,.35); }
    #game-screen { display: none; }
  </style>
</head>
<body>
  <div id="title-screen" class="screen">
    <h1 class="game-title">Re:Block</h1>
    <p style="margin-top: 10px; font-weight: 700;">落ち物リサイクルパズルゲーム</p>
    <button class="eco-btn" onclick="alert('ゲームを新しく読み込みます。保存完了後に遊べます！')">START GAME</button>
  </div>
</body>
</html>
